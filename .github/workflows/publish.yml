name: Publish container image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: org-01kkkppnnytj41vh4x02et4a8q.registry-stage.airelabs.studio
  IMAGE_NAME: lcoe-r
  BLOB_CHUNK_BYTES: "50000000"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install regctl
        uses: regclient/actions/regctl-installer@v0.1.0

      - name: Log in to Aire Labs registry
        run: |
          printf '%s' "${{ secrets.AIRE_API_KEY }}" \
            | regctl registry login "$REGISTRY" --user api-key --pass-stdin

      - name: Configure chunked uploads
        run: |
          regctl registry set "$REGISTRY" \
            --blob-max "$BLOB_CHUNK_BYTES" \
            --blob-chunk "$BLOB_CHUNK_BYTES"

      - name: Build image to OCI layout (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --output "type=oci,dest=oci-layout,tar=false,name=$IMAGE_NAME:${GITHUB_REF_NAME}" \
            .

      - name: Push image with regctl (chunked)
        run: |
          regctl image copy \
            "ocidir://oci-layout:${GITHUB_REF_NAME}" \
            "$REGISTRY/$IMAGE_NAME:${GITHUB_REF_NAME}"
